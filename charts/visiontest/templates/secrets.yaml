apiVersion: v1
kind: Secret
metadata:
  name: {{ include "visiontest.secretName" . }}
  labels:
    {{- include "visiontest.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | quote }}
  redis-url: {{ include "visiontest.redisUrl" . | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  jwt-refresh-secret: {{ .Values.secrets.jwtRefreshSecret | quote }}
  minio-access-key: {{ .Values.secrets.minioAccessKey | quote }}
  minio-secret-key: {{ .Values.secrets.minioSecretKey | quote }}
  {{- if .Values.secrets.encryptionKey }}
  encryption-key: {{ .Values.secrets.encryptionKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}

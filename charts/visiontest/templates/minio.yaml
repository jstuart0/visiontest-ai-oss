{{- if .Values.minio.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "visiontest.fullname" . }}-minio
  labels:
    {{- include "visiontest.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
    {{- include "visiontest.selectorLabels" (dict "component" "minio" "context" .) | nindent 4 }}
spec:
  serviceName: {{ include "visiontest.fullname" . }}-minio
  replicas: 1
  selector:
    matchLabels:
      {{- include "visiontest.selectorLabels" (dict "component" "minio" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "visiontest.labels" . | nindent 8 }}
        {{- include "visiontest.selectorLabels" (dict "component" "minio" "context" .) | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          args:
            - server
            - /data
            - --console-address
            - ":{{ .Values.minio.consolePort }}"
          ports:
            - containerPort: 9000
              name: api
              protocol: TCP
            - containerPort: {{ .Values.minio.consolePort }}
              name: console
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: minio-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: minio-secret-key
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: minio-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.minio.storageClassName }}
        storageClassName: {{ .Values.minio.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "visiontest.fullname" . }}-minio
  labels:
    {{- include "visiontest.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  selector:
    {{- include "visiontest.selectorLabels" (dict "component" "minio" "context" .) | nindent 4 }}
  ports:
    - port: 9000
      targetPort: 9000
      name: api
      protocol: TCP
    - port: {{ .Values.minio.consolePort }}
      targetPort: {{ .Values.minio.consolePort }}
      name: console
      protocol: TCP
{{- end }}

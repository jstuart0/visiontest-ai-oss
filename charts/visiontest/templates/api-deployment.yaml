apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "visiontest.fullname" . }}-api
  labels:
    {{- include "visiontest.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    {{- include "visiontest.selectorLabels" (dict "component" "api" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "visiontest.selectorLabels" (dict "component" "api" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "visiontest.labels" . | nindent 8 }}
        {{- include "visiontest.selectorLabels" (dict "component" "api" "context" .) | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "visiontest.apiImage" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.api.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: jwt-refresh-secret
            - name: MINIO_ENDPOINT
              value: {{ include "visiontest.minioEndpoint" . | quote }}
            - name: MINIO_PORT
              value: {{ include "visiontest.minioPort" . | quote }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: minio-secret-key
            {{- if .Values.secrets.encryptionKey }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "visiontest.secretName" . }}
                  key: encryption-key
            {{- end }}
            {{- if .Values.api.env.corsOrigin }}
            - name: CORS_ORIGIN
              value: {{ .Values.api.env.corsOrigin | quote }}
            {{- else if .Values.ingress.enabled }}
            - name: CORS_ORIGIN
              value: {{ printf "https://%s" .Values.ingress.hosts.web | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "visiontest.fullname" . }}-api
  labels:
    {{- include "visiontest.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "visiontest.selectorLabels" (dict "component" "api" "context" .) | nindent 4 }}
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
      name: http
      protocol: TCP

name: Feature Request
description: Suggest a new feature for VisionTest AI
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web UI
        - API
        - Worker
        - CLI/SDK
        - Documentation
        - Other

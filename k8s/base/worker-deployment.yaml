apiVersion: apps/v1
kind: Deployment
metadata:
  name: visiontest-worker
  namespace: visiontest
  labels:
    app: visiontest-worker
    app.kubernetes.io/name: visiontest-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visiontest-worker
  template:
    metadata:
      labels:
        app: visiontest-worker
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/visiontest-ai/visiontest-worker:latest
          imagePullPolicy: Always
          workingDir: /app/packages/database
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: visiontest-secrets
                  key: database-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: worker
          image: ghcr.io/visiontest-ai/visiontest-worker:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: "production"
            - name: WORKER_CONCURRENCY
              value: "2"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: visiontest-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: visiontest-secrets
                  key: redis-url
            - name: MINIO_ENDPOINT
              value: "minio"
            - name: MINIO_PORT
              value: "9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: visiontest-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: visiontest-secrets
                  key: minio-secret-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: visiontest-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          # Playwright needs SYS_ADMIN for Chromium sandbox, must run as root
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN

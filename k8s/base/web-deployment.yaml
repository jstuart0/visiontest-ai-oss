apiVersion: apps/v1
kind: Deployment
metadata:
  name: visiontest-web
  namespace: visiontest
  labels:
    app: visiontest-web
    app.kubernetes.io/name: visiontest-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visiontest-web
  template:
    metadata:
      labels:
        app: visiontest-web
    spec:
      containers:
        - name: web
          image: ghcr.io/visiontest-ai/visiontest-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://visiontest-api.example.com/api"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: visiontest-web
  namespace: visiontest
spec:
  selector:
    app: visiontest-web
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP

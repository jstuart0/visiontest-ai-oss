apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: visiontest-ingress
  namespace: visiontest
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
    - hosts:
        - visiontest.example.com
        - visiontest-api.example.com
      secretName: visiontest-tls
  rules:
    - host: visiontest.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: visiontest-web
                port:
                  number: 3000
    - host: visiontest-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: visiontest-api
                port:
                  number: 3000

apiVersion: v1
kind: Secret
metadata:
  name: visiontest-secrets
  namespace: visiontest
type: Opaque
stringData:
  # Database - will be set in overlay
  database-url: "postgresql://visiontest:CHANGE_ME@postgres:5432/visiontest"
  
  # Redis
  redis-url: "redis://:CHANGE_ME@redis:6379"
  redis-password: "CHANGE_ME"
  
  # JWT (generate with: openssl rand -base64 32)
  jwt-secret: "CHANGE_ME"
  jwt-refresh-secret: "CHANGE_ME"
  
  # MinIO
  minio-access-key: "visiontest"
  minio-secret-key: "CHANGE_ME"
  
  # AI (optional)
  anthropic-api-key: ""
